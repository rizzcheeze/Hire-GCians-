<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hire GCians! — Settings</title>
<link rel="stylesheet" href="/hire_gcians.css">
</head>
<body class="hg-student-profile" data-page="settings">
<div class="dash">
  <aside class="sidebar">
    <div class="s-logo">Hire <span>GCians!</span></div>
    <div class="s-user">
      <div class="s-avatar">AE</div>
      <div><div class="s-name">Allyana Espiridion</div><div class="s-prog">BSCS 2-B</div></div>
    </div>
    <ul class="s-nav">
      <li onclick="location.href='/student/dashboard'">⬡ Dashboard</li>
      <li onclick="location.href='/student/jobs'">⬡ Browse jobs</li>
      <li onclick="location.href='/student/applications'">⬡ My applications</li>
      <li onclick="location.href='/student/saved'">⬡ Saved</li>
      <div class="s-nav-label">Account</div>
      <li onclick="location.href='/student/profile'">⬡ Edit profile</li>
      <li onclick="location.href='/student/resume'">⬡ Skills &amp; resume</li>
      <li class="active">⬡ Settings</li>
    </ul>
  </aside>
  <main class="main">
  <div class="main-header">
    <div>
      <div class="page-title">Settings</div>
      <div class="page-sub">Manage notifications, visibility, and work preferences.</div>
    </div>
    <div style="display:flex;gap:0.5rem">
      <button class="btn-outline" onclick="location.href='/student/profile'">Edit profile</button>
      <button class="btn-sm" id="settings-save-button">Save settings</button>
    </div>
  </div>
  <div class="content">
    <div>
      <div class="card">
        <div class="card-title">Notifications</div>
        <label class="settings-row"><span>Email me for new matches</span><input type="checkbox" id="setting-email-matches"></label>
        <label class="settings-row"><span>Email me for application updates</span><input type="checkbox" id="setting-email-apps"></label>
        <label class="settings-row"><span>Show my public profile to employers</span><input type="checkbox" id="setting-public-profile"></label>
      </div>
      <div class="card">
        <div class="card-title">Work preferences</div>
        <label class="form-label">Preferred setup</label>
        <select class="form-select" id="setting-work-setup">
          <option>On-site / Remote</option>
          <option>On-site only</option>
          <option>Remote only</option>
        </select>
        <label class="form-label">Availability</label>
        <input class="form-input" id="setting-availability" placeholder="Weekdays after class">
      </div>
    </div>
    <div>
    </div>
  </div>
  </main>
</div>
<script src="/hire_gcians.js"></script>
</body>
</html>
